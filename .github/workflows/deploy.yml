name: Production Deployment

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_WEB: ${{ github.repository }}/web
  IMAGE_NAME_API: ${{ github.repository }}/api
  IMAGE_NAME_WORKER: ${{ github.repository }}/worker

jobs:
  test:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}
          tags: |
            type=sha,format=long

      # Web
      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      # API
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      # Worker
      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/worker.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Kubectl
        uses: azure/setup-kubectl@v3
        
      - name: Configure Kubernetes access
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update Manifest Image Tags
        run: |
          # Replace 'latest' tag with the specific SHA that was just built
          sed -i "s|image: leadflow/web:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:sha-${{ github.sha }}|g" infra/k8s/deployments/frontend.yaml
          sed -i "s|image: leadflow/api:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:sha-${{ github.sha }}|g" infra/k8s/deployments/api.yaml
          sed -i "s|image: leadflow/worker:latest|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}:sha-${{ github.sha }}|g" infra/k8s/deployments/worker.yaml

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/deployments/
          kubectl apply -f infra/k8s/hpa/
          kubectl apply -f infra/k8s/ingress/

      - name: Verify API Rollout
        run: kubectl rollout status deployment/leadflow-api -n leadflow --timeout=120s

      - name: Verify Web Rollout
        run: kubectl rollout status deployment/leadflow-frontend -n leadflow --timeout=120s
        
      - name: Verify Worker Rollout
        run: kubectl rollout status deployment/leadflow-worker -n leadflow --timeout=120s

      - name: Smoke Test API
        run: |
          # Simple curl to check if the health endpoint is responding 200 OK
          curl -f --retry 3 --retry-delay 5 https://api.leadflow.ai/health || (
            echo "Smoke test failed! Initiating rollback..."
            kubectl rollout undo deployment/leadflow-api -n leadflow
            kubectl rollout undo deployment/leadflow-frontend -n leadflow
            kubectl rollout undo deployment/leadflow-worker -n leadflow
            exit 1
          )
