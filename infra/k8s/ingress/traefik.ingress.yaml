apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leadflow-ingress
  namespace: leadflow
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - leadflow.ai
        - api.leadflow.ai
      secretName: leadflow-tls-secret
  rules:
    - host: leadflow.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
    - host: api.leadflow.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80
