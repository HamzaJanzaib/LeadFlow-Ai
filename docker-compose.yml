version: "3.9"

services:
  # ─── PostgreSQL 16 with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: leadflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow
      POSTGRES_DB: leadflow_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadflow -d leadflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: leadflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible Object Storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: leadflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"   # S3 API
      - "9003:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO bucket initializer ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: leadflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/leadflow-storage;
      mc anonymous set download local/leadflow-storage/public;
      echo 'MinIO bucket created';
      "

  # ─── Meilisearch (Full-text Search) ───────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: leadflow-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Langfuse (AI Observability) ──────────────────────────────────────────
  langfuse-server:
    image: langfuse/langfuse:latest
    container_name: leadflow-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://leadflow:leadflow@postgres:5432/langfuse
      NEXTAUTH_SECRET: langfuse-nextauth-secret-change-in-prod
      NEXTAUTH_URL: http://localhost:3100
      SALT: langfuse-salt-change-in-prod
      TELEMETRY_ENABLED: "false"
    ports:
      - "3101:3000"

volumes:
  postgres_data:
    name: leadflow-postgres-data
  redis_data:
    name: leadflow-redis-data
  minio_data:
    name: leadflow-minio-data
  meilisearch_data:
    name: leadflow-meilisearch-data

networks:
  default:
    name: leadflow-network
