version: "3.9"

services:
  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: leadflow-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:4000
    depends_on:
      - api

  # ─── Fastify API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: leadflow-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://leadflow:leadflow@postgres:5432/leadflow_prod?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  # ─── BullMQ Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: leadflow-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://leadflow:leadflow@postgres:5432/leadflow_prod?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - api

  # ─── PostgreSQL 16 with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: leadflow-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow
      POSTGRES_DB: leadflow_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadflow -d leadflow_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: leadflow-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_prod_data:
    name: leadflow-postgres-prod-data
  redis_prod_data:
    name: leadflow-redis-prod-data

networks:
  default:
    name: leadflow-prod-network
